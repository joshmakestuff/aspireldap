name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Runs for every push, PR, and tag — a tagged commit is never published untested.
  test:
    # ubuntu-latest (24.04+) ships only the upstream libldap.so.2 soname. The integrations
    # register a DllImportResolver that finds it, so no libldap install/symlink step is
    # needed — running here is what proves the resolver works on a 2.6-only distro (#8).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        working-directory: aspireOpenLdap
        run: dotnet restore AspireOpenLdap.slnx

      - name: Verify formatting
        working-directory: aspireOpenLdap
        run: dotnet format AspireOpenLdap.slnx --verify-no-changes --no-restore

      # Includes the Docker-backed integration tests (the bundled OpenLDAP image is
      # built by the test AppHost on first use).
      - name: Test
        working-directory: aspireOpenLdap
        run: dotnet test AspireOpenLdap.slnx --configuration Release --no-restore

      # Build the examples so they can't rot against the library. Build-only (no Docker / no run).
      - name: Build examples
        run: dotnet build examples/AspireOpenLdap.Examples.slnx --configuration Release

  pack:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute package version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(grep -oP '(?<=<Version>)[^<]+' aspireOpenLdap/Directory.Build.props)
            VERSION="${BASE}.ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

      - name: Restore
        working-directory: aspireOpenLdap
        run: dotnet restore AspireOpenLdap.slnx

      - name: Pack
        working-directory: aspireOpenLdap
        run: |
          dotnet pack AspireOpenLdap.slnx \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.ver.outputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            --output ../artifacts

      - name: Upload nupkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

  # Publishes the artifacts packed from the exact tagged commit, and only after the
  # test job (unit + Docker integration + example build) has passed on that commit.
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, pack]
    permissions:
      contents: read
      id-token: write   # OIDC trusted publishing to nuget.org — scoped to this job only
    steps:
      - name: Download nupkg artifacts
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: artifacts

      # Trusted publishing: exchange a GitHub OIDC token for a short-lived nuget.org
      # API key (valid ~1h). No long-lived secret stored in the repo. Requires a
      # trusted publishing policy on nuget.org bound to this repo + workflow file.
      - name: NuGet login (OIDC → short-lived key)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org username (profile name), not email

      - name: Push to nuget.org
        working-directory: artifacts
        run: |
          dotnet nuget push '*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --skip-duplicate
