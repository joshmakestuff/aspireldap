name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute package version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(grep -oP '(?<=<Version>)[^<]+' aspireOpenLdap/Directory.Build.props)
            VERSION="${BASE}.ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

      - name: Restore
        working-directory: aspireOpenLdap
        run: dotnet restore AspireOpenLdap.slnx

      # Skipped on tag (publish) runs — the smoke test builds the bundled OpenLDAP
      # image via Docker and is slow; it gates merges to master and PRs instead.
      - name: Test
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        working-directory: aspireOpenLdap
        run: dotnet test AspireOpenLdap.slnx --configuration Release --no-restore

      - name: Pack
        working-directory: aspireOpenLdap
        run: |
          dotnet pack AspireOpenLdap.slnx \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.ver.outputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            --output ../artifacts

      - name: Upload nupkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

      - name: Push to nuget.org
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: artifacts
        run: |
          dotnet nuget push '*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate
