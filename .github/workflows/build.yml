name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    # Pinned to 22.04: System.DirectoryServices.Protocols (used by the health check and
    # client) P/Invokes the native libldap-2.5 soname on Linux, which Jammy provides.
    # Ubuntu 24.04 ships libldap-2.6 and the load fails. See the "Install OpenLDAP client
    # libraries" step below.
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing to nuget.org
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The integration tests' health check loads libldap on the runner host (not in the
      # container). Skipped on tag/publish runs, which don't run tests.
      - name: Install OpenLDAP client libraries
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: sudo apt-get update && sudo apt-get install -y libldap-2.5-0

      - name: Compute package version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(grep -oP '(?<=<Version>)[^<]+' aspireOpenLdap/Directory.Build.props)
            VERSION="${BASE}.ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Computed version: ${VERSION}"

      - name: Restore
        working-directory: aspireOpenLdap
        run: dotnet restore AspireOpenLdap.slnx

      # Skipped on tag (publish) runs — the smoke test builds the bundled OpenLDAP
      # image via Docker and is slow; it gates merges to master and PRs instead.
      - name: Test
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        working-directory: aspireOpenLdap
        run: dotnet test AspireOpenLdap.slnx --configuration Release --no-restore

      # Build the examples so they can't rot against the library. Build-only (no Docker /
      # no run); skipped on tag/publish runs.
      - name: Build examples
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: dotnet build examples/AspireOpenLdap.Examples.slnx --configuration Release

      - name: Pack
        working-directory: aspireOpenLdap
        run: |
          dotnet pack AspireOpenLdap.slnx \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.ver.outputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            --output ../artifacts

      - name: Upload nupkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

      # Trusted publishing: exchange a GitHub OIDC token for a short-lived nuget.org
      # API key (valid ~1h). No long-lived secret stored in the repo. Requires a
      # trusted publishing policy on nuget.org bound to this repo + workflow file.
      - name: NuGet login (OIDC → short-lived key)
        if: startsWith(github.ref, 'refs/tags/v')
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}   # your nuget.org username (profile name), not email

      - name: Push to nuget.org
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: artifacts
        run: |
          dotnet nuget push '*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} \
            --skip-duplicate
