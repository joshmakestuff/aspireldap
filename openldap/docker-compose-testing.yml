# OpenLDAP Docker Compose — testing (uses image defaults)
# SPDX-License-Identifier: Apache-2.0

services:
  openldap:
    build:
      context: ./2.6/debian-12
      dockerfile: Dockerfile
    ports:
      - '1389:1389'
      - '1636:1636'
    volumes:
      - 'openldap_data:/data/openldap'

volumes:
  openldap_data:
    driver: local
