# OpenLDAP Docker Compose — builds from local Dockerfile
# SPDX-License-Identifier: Apache-2.0

services:
  openldap:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '1389:1389'
      - '1636:1636'
    environment:
      - LDAP_ADMIN_USERNAME=admin
      - LDAP_ADMIN_PASSWORD=adminpassword
      - LDAP_USERS=user01,user02
      - LDAP_PASSWORDS=password1,password2
    volumes:
      - 'openldap_data:/data/openldap'

volumes:
  openldap_data:
    driver: local
